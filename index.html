<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural Digital - Ituiutaba</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="tela ativa" id="tela-tempo">
        <video autoplay muted loop playsinline preload="auto" id="weather-video">
            <source src="assets/ceu-limpo.mp4" type="video/mp4">
        </video>
        
        <div class="glass-ui">
            <div class="weather-layout">
                <div class="clock-side">
                    <div id="relogio">00:00:00</div>
                    <div id="data-extenso">Carregando data...</div>
                </div>
                <div class="info-side">
                    <div id="cidade">ITUIUTABA</div>
                    <div id="temp-valor">--°C</div>
                    <div id="condicao">CARREGANDO...</div>
                    <div class="temp-range">
                        <span id="temp-max">Máx: --°C</span>
                        <span class="divider">|</span>
                        <span id="temp-min">Min: --°C</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="tela" id="tela-boas-vindas">
        <img src="assets/boas-vindas.png" alt="Boas Vindas">
    </section>

    <section class="tela" id="tela-calendario">
        <img src="assets/calendario.png" alt="Calendário Acadêmico">
    </section>

    <section class="tela" id="tela-guia">
        <img src="assets/guiadoaluno.png" alt="Guia do Aluno">
    </section>

    <section class="tela" id="tela-biblioteca">
        <img src="assets/biblioteca.png" alt="Biblioteca">
    </section>

    <section class="tela" id="tela-jaleco">
        <img src="assets/jaleco1.png" alt="Aviso Jaleco">
    </section>

    <section class="tela" id="tela-jaleco">
        <img src="assets/jaleco2.png" alt="Aviso Jaleco">
    </section>
    
    <script src="script.js"></script>
</body>
</html>
